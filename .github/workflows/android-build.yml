name: Build Android APK (Capacitor)

on:
  workflow_dispatch: # Allows you to manually trigger the build from GitHub UI
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Generate Production Env
        working-directory: ./frontend
        run: |
          echo "VITE_API_URL=https://nitisetu-backend-4p2o.onrender.com/api" > .env
          echo "VITE_GOOGLE_CLIENT_ID=515460372089-vgsm525bskgiikc6k4mv8616kh9u87f6.apps.googleusercontent.com" >> .env
          echo "VITE_APP_PLATFORM=android" >> .env

      - name: Build Web Assets (Vite)
        working-directory: ./frontend
        run: |
          npm run build
          find dist -name "*.gz" -type f -delete

      - name: Sync Capacitor Android Project
        working-directory: ./frontend
        run: npm run cap sync android

      - name: Grant Execute Permission to Gradle
        working-directory: ./frontend/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: ./frontend/android
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NitiSetu-Android-Debug-APK
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
